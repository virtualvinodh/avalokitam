ServerName localhost

<VirtualHost *:8080>
    DocumentRoot /var/www/html

    # ── Node.js backend (AI, venpa, compositions) ────────────────────────
    <Location /ai/>
        ProxyPass        http://localhost:3001/ai/
        ProxyPassReverse http://localhost:3001/ai/
        SetEnv           proxy-nokeepalive 1
        Header           set X-Accel-Buffering "no"
    </Location>
    <Location /venpa/>
        ProxyPass        http://localhost:3001/venpa/
        ProxyPassReverse http://localhost:3001/venpa/
    </Location>
    <Location /compositions/>
        ProxyPass        http://localhost:3001/compositions/
        ProxyPassReverse http://localhost:3001/compositions/
    </Location>
    <Location /health>
        ProxyPass        http://localhost:3001/health
        ProxyPassReverse http://localhost:3001/health
    </Location>

    # ── PHP + SPA ─────────────────────────────────────────────────────────
    <Directory /var/www/html>
        AllowOverride All
        Require all granted

        # Vue Router history mode — serve index.html for all non-file routes
        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_URI}      !^/api\.php
        RewriteCond %{REQUEST_URI}      !^/getRhymingWords\.php
        RewriteRule ^ /index.html [L]
    </Directory>

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
