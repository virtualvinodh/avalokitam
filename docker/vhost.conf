ServerName localhost

<VirtualHost *:8080>
    DocumentRoot /var/www/html

    # ── AI backend (Node.js on localhost:3001) ────────────────────────────
    # SSE-safe: buffering off, long timeout
    <Location /ai/>
        ProxyPass        http://localhost:3001/ai/
        ProxyPassReverse http://localhost:3001/ai/
        SetEnv           proxy-nokeepalive 1
        Header           set X-Accel-Buffering "no"
    </Location>

    # ── PHP + SPA ─────────────────────────────────────────────────────────
    <Directory /var/www/html>
        AllowOverride All
        Require all granted

        # Vue Router history mode
        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_URI}      !^/api\.php
        RewriteCond %{REQUEST_URI}      !^/getRhymingWords\.php
        RewriteRule ^ index.html [L]
    </Directory>

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
