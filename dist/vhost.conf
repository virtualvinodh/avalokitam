<VirtualHost *:8080>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www

    # ── AI backend proxy (URL injected at startup via entrypoint.sh) ──────
    # Needs SSE support: buffering off, long timeout
    <Location /ai/>
        ProxyPass        AI_BACKEND_URL_PLACEHOLDER/ai/
        ProxyPassReverse AI_BACKEND_URL_PLACEHOLDER/ai/
        RequestHeader    set X-Forwarded-Proto "https"
        # SSE: disable buffering so chunks stream through immediately
        Header           set X-Accel-Buffering "no"
        SetEnv           proxy-nokeepalive 1
        SetEnv           proxy-sendchunked 1
    </Location>

    # ── PHP / static files ────────────────────────────────────────────────
    <Directory /var/www>
        AllowOverride All
        Require all granted

        # Vue Router history mode: serve index.html for unknown paths
        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI}      !^/api\.php
        RewriteCond %{REQUEST_URI}      !^/getRhymingWords\.php
        RewriteRule ^ index.html [L]
    </Directory>

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
